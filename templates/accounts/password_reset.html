{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center auth-screen">
    <div class="col-md-8 col-lg-6">
        <div class="card auth-card">
            <div class="card-header">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-key-fill"></i>
                    <span>Reset password</span>
                </div>
            </div>
            <div class="card-body">
                <p class="text-muted small">Enter your email and we will send you a link to reset your password.</p>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% include "shared/_form_fields.html" %}
                    <button type="submit" class="btn btn-primary w-100">Send reset email</button>
                </form>
                <div class="mt-3 small text-muted text-center">
                    <a href="{% url 'login' %}">Back to login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
