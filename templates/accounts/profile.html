{% extends "base.html" %}
{% block content %}
<h2 class="page-title">My Profile</h2>
<div class="card col-md-8 col-lg-6">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'password_change' %}" class="btn btn-outline-secondary">Change password</a>
        </form>
    </div>
</div>
{% endblock %}
