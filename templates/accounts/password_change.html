{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Change Password</h2>
<div class="card col-md-8 col-lg-6">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Update password</button>
        </form>
    </div>
</div>
{% endblock %}
