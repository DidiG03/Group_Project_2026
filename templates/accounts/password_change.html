{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Change Password</h2>
<div class="row">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% include "shared/_form_fields.html" %}
                    <button type="submit" class="btn btn-primary">Update password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
