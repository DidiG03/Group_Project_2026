{% extends "base.html" %}
{% block content %}
<h2>Draft Messages</h2>
<ul class="list-group">
    {% for message in messages %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <span><strong>{{ message.subject }}</strong> - saved {{ message.created_at }}</span>
            <a class="btn btn-sm btn-outline-danger" href="{% url 'message_delete' message.pk %}">Delete</a>
        </li>
    {% empty %}
        <li class="list-group-item">No draft messages.</li>
    {% endfor %}
</ul>
{% endblock %}
