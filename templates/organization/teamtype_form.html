{% extends "base.html" %}
{% block content %}
<h2 class="page-title">Add Team Type</h2>
<div class="card">
    <div class="card-body">
        <form method="post" novalidate>
            {% csrf_token %}
            {% include "shared/_form_fields.html" %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Team Type</button>
                <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
